name: Gmail Email Logger Full History

on:
  workflow_dispatch:

concurrency:
  group: gmail-email-logger-full-history
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-logger:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore OAuth files from secrets
        env:
          CREDENTIALS_JSON_B64: ${{ secrets.GMAIL_CREDENTIALS_JSON_B64 }}
          TOKEN_PICKLE_B64: ${{ secrets.GMAIL_TOKEN_PICKLE_B64 }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ -z "$CREDENTIALS_JSON_B64" ]; then
            echo "Missing secret: GMAIL_CREDENTIALS_JSON_B64"
            exit 1
          fi
          if [ -z "$TOKEN_PICKLE_B64" ]; then
            echo "Missing secret: GMAIL_TOKEN_PICKLE_B64"
            exit 1
          fi
          if [ -z "$SPREADSHEET_ID" ]; then
            echo "Missing secret: SPREADSHEET_ID"
            exit 1
          fi

          python - <<'PY'
          import base64
          import os

          with open('credentials.json', 'wb') as f:
              f.write(base64.b64decode(os.environ['CREDENTIALS_JSON_B64']))
          with open('token.pickle', 'wb') as f:
              f.write(base64.b64decode(os.environ['TOKEN_PICKLE_B64']))
          PY

      - name: Verify script syntax
        run: python -m py_compile gmail_email_logger.py

      - name: Compute days since 2026-01-01
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          import os

          start = datetime(2026, 1, 1, tzinfo=timezone.utc)
          now = datetime.now(timezone.utc)
          days_back = max(1, (now - start).days + 1)

          print(f"Using GMAIL_DAYS_BACK={days_back} (from 2026-01-01 UTC)")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"GMAIL_DAYS_BACK={days_back}\n")
          PY

      - name: Reset full-history state file
        run: rm -f sync_state_2026_full_history.json

      - name: Run logger full history (single cycle)
        env:
          LOGGER_RUN_MODE: once
          GMAIL_OAUTH_MODE: local
          LOGGER_IGNORE_STATE: "false"
          LOGGER_STATE_FILE: sync_state_2026_full_history.json
          GMAIL_FETCH_ALL: "false"
          GMAIL_HOURS_BACK: "0"
          GMAIL_MAX_RESULTS_PER_LABEL: "0"
          GMAIL_REQUEST_DELAY_SECONDS: "0"
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python gmail_email_logger.py
