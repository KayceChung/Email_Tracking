name: Gmail Email Logger

on:
  push:
    branches:
      - main
  schedule:
    # Chay moi 10 phut (UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: gmail-email-logger
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-logger:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore OAuth files from secrets
        env:
          CREDENTIALS_JSON_B64: ${{ secrets.GMAIL_CREDENTIALS_JSON_B64 }}
          TOKEN_PICKLE_B64: ${{ secrets.GMAIL_TOKEN_PICKLE_B64 }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ -z "$CREDENTIALS_JSON_B64" ]; then
            echo "Missing secret: GMAIL_CREDENTIALS_JSON_B64"
            exit 1
          fi
          if [ -z "$TOKEN_PICKLE_B64" ]; then
            echo "Missing secret: GMAIL_TOKEN_PICKLE_B64"
            exit 1
          fi
          if [ -z "$SPREADSHEET_ID" ]; then
            echo "Missing secret: SPREADSHEET_ID"
            exit 1
          fi

          python - <<'PY'
          import base64
          import os

          with open('credentials.json', 'wb') as f:
              f.write(base64.b64decode(os.environ['CREDENTIALS_JSON_B64']))
          with open('token.pickle', 'wb') as f:
              f.write(base64.b64decode(os.environ['TOKEN_PICKLE_B64']))
          PY

      - name: Verify script syntax
        run: python -m py_compile gmail_email_logger.py

      - name: Run logger (single cycle)
        env:
          LOGGER_RUN_MODE: once
          GMAIL_OAUTH_MODE: local
          LOGGER_IGNORE_STATE: "false"
          LOGGER_STATE_FILE: sync_state.json
          GMAIL_FETCH_ALL: "false"
          GMAIL_HOURS_BACK: "24"
          GMAIL_MAX_RESULTS_PER_LABEL: "0"
          GMAIL_REQUEST_DELAY_SECONDS: "0"
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python gmail_email_logger.py
